run:
  output_dir: "data/streaming_input"
  session_name: "streaming_input"
  target_fps: 10.0
  latency_sla_ms: 100.0
  max_frames: 60

artifact:
  runs_root: "data/runs"
  run_dir: null
  model_name: "rd4ad"
  fit_policy: "auto"   # auto | historical_fit | skip_fit

input:
  root_dir: "data/raw/extracted"
  loop: false
  sequence_mode: "interleaved_labels"

preprocessing:
  resize:
    enabled: true
    width: 256
    height: 256
  normalize:
    enabled: true
    mode: "0_1"

web:
  enabled: true
  host: "127.0.0.1"
  port: 8765
  refresh_ms: 1000
