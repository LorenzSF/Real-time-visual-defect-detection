# Job A "val_defect" overlay — same 3 feature-based models as
# colab_featurebased.yaml, but with thresholding.mode = "val_f1" and the
# industrial-calibration split rules:
#   * val_balance: equal              → val ends up 50/50 good/bad so the
#                                       F1 curve is not biased by val
#                                       prevalence (which varies wildly
#                                       across categories).
#   * val_bad_balance_by_type: true   → per defect_type the val bad pool
#                                       is capped at ceil(min_class *
#                                       (1 + tolerance)). The dominant
#                                       defect class no longer monopolises
#                                       calibration.
#   * val_balance_tolerance: 0.15     → ±15% wiggle room around the
#                                       smallest defect class.
#   * min_train_goods: 200            → train pool floor. Raised from the
#                                       default 50 because the v1 rerun
#                                       (2026-04-26) showed AUROC dropped
#                                       0.04–0.12 on cats where train
#                                       collapsed to ~52 goods (PaDiM/
#                                       PatchCore feature-bank starvation).
#                                       At 200 the per-type val cap is
#                                       scaled down further but train
#                                       stays large enough for the
#                                       Gaussian/coreset to fit.

_extends: ../default.yaml

run:
  run_name: "jobA_val_defect"
  output_dir: "/content/work/runs"

runtime:
  device: "auto"
  precision: "fp32"
  num_workers: 2
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  format: "real_iad"
  # Overridden per-category by scripts/run_jobA_val_defect_colab.sh.
  path: "/content/work/current"
  extract_dir: "/content/work/current"
  cameras: "C1"
  split:
    val_balance: "equal"
    val_bad_balance_by_type: true
    val_balance_tolerance: 0.15
    min_train_goods: 200

benchmark:
  save_umap: false
  models:
    - name: "anomalib_patchcore"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 256
        batch_size: 8
        pre_trained: true
        backbone: "wide_resnet50_2"
        layers: ["layer2", "layer3"]
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
        n_features: null

    - name: "anomalib_padim"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 256
        batch_size: 16
        pre_trained: true
        backbone: "resnet18"
        layers: ["layer1", "layer2", "layer3"]

    - name: "subspacead"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      subspacead:
        model_ckpt: "facebook/dinov2-with-registers-large"
        image_size: 256
        batch_size: 4
        pca_ev: 0.99
        pca_dim: null
        img_score_agg: "mtop1p"
        layers: [-12, -13, -14, -15, -16, -17, -18]
