# Job C (corruption robustness) — Deceuninck overlay for Colab.
# Used by scripts/run_jobC.sh. Single-cell dataset (no per-category loop).
# Model and corruption are CLI overrides — see header in run_jobC.sh.
#
# benchmark.models[] carries per-model anomalib overrides that match the
# known-good Job B val_defect Colab settings. main.py's --model flag picks
# the matching entry — without this, PaDiM would inherit PatchCore's
# wide_resnet50_2 backbone and OOM on the covariance step on a 24 GB GPU.

_extends: ../default.yaml

run:
  run_name: "jobC_deceuninck"
  output_dir: "/content/work/runs"

runtime:
  device: "auto"
  precision: "fp32"
  num_workers: 2
  pin_memory: true
  cudnn_benchmark: true

dataset:
  source_type: "folder"
  format: "auto"
  # Overridden by run_jobC.sh via --dataset-path; the "auto" loader recognises
  # defects/ via _BAD_DIR_NAMES and uses each subfolder name as defect_type.
  path: "/content/work/current"
  extract_dir: "/content/work/current"

benchmark:
  save_umap: false
  models:
    - name: "anomalib_patchcore"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 8
        pre_trained: true
        backbone: "wide_resnet50_2"
        layers: ["layer2", "layer3"]
        coreset_sampling_ratio: 0.1
        num_neighbors: 9
        n_features: null

    - name: "anomalib_padim"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      anomalib:
        image_size: 512
        batch_size: 16
        pre_trained: true
        backbone: "resnet18"
        layers: ["layer1", "layer2", "layer3"]

    - name: "subspacead"
      threshold: 0.5
      thresholding:
        mode: "val_f1"
        target_fpr: 0.01
      subspacead:
        model_ckpt: "facebook/dinov2-with-registers-large"
        image_size: 512
        batch_size: 4
        pca_ev: 0.99
        pca_dim: null
        img_score_agg: "mtop1p"
        layers: [-12, -13, -14, -15, -16, -17, -18]
